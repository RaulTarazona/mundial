<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Asociaciones</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav>
  <a class="nav-brand" th:href="@{/}">&#9917; Mundial</a>
  <ul class="nav-links">
    <li><a th:href="@{/clubes}">Clubes</a></li>
    <li><a th:href="@{/asociaciones}">Asociaciones</a></li>
    <li><a th:href="@{/entrenadores}">Entrenadores</a></li>
    <li><a th:href="@{/jugadores}">Jugadores</a></li>
    <li><a th:href="@{/competiciones}">Competiciones</a></li>
  </ul>
</nav>
<div class="container">
  <div class="page-header">
    <h2>Asociaciones</h2>
    <a th:href="@{/asociaciones/nueva}" class="btn btn-primary">+ Nueva</a>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Nombre</th><th>País</th><th>Presidente</th><th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(asociaciones)}">
          <td colspan="4" class="empty">No hay asociaciones registradas.</td>
        </tr>
        <tr th:each="a : ${asociaciones}">
          <td th:text="${a.nombre}"></td>
          <td th:text="${a.pais}"></td>
          <td th:text="${a.presidente}"></td>
          <td>
            <div class="actions">
              <a th:href="@{/asociaciones/editar/{id}(id=${a.id})}" class="btn btn-secondary btn-sm">Editar</a>
              <a th:href="@{/asociaciones/eliminar/{id}(id=${a.id})}" class="btn btn-danger btn-sm">Eliminar</a>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <a th:href="@{/}" class="back-link">&#8592; Volver al inicio</a>
</div>
<footer>Mundial 2026 &mdash; Sistema de Gestión</footer>
</body>
</html>
