<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><title>Jugadores</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav>
  <a class="nav-brand" th:href="@{/}">&#9917; Mundial</a>
  <ul class="nav-links">
    <li><a th:href="@{/clubes}">Clubes</a></li>
    <li><a th:href="@{/asociaciones}">Asociaciones</a></li>
    <li><a th:href="@{/entrenadores}">Entrenadores</a></li>
    <li><a th:href="@{/jugadores}">Jugadores</a></li>
    <li><a th:href="@{/competiciones}">Competiciones</a></li>
  </ul>
</nav>
<div class="container">
  <div class="page-header">
    <h2>Jugadores</h2>
    <a th:href="@{/jugadores/nuevo}" class="btn btn-primary">+ Nuevo</a>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Nombre</th><th>Apellido</th><th>Número</th><th>Posición</th><th>Acciones</th></tr></thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(jugadores)}">
          <td colspan="5" class="empty">No hay jugadores registrados.</td>
        </tr>
        <tr th:each="j : ${jugadores}">
          <td th:text="${j.nombre}"></td>
          <td th:text="${j.apellido}"></td>
          <td th:text="${j.numero}"></td>
          <td th:text="${j.posicion}"></td>
          <td><div class="actions">
            <a th:href="@{/jugadores/editar/{id}(id=${j.id})}" class="btn btn-secondary btn-sm">Editar</a>
            <a th:href="@{/jugadores/eliminar/{id}(id=${j.id})}" class="btn btn-danger btn-sm">Eliminar</a>
          </div></td>
        </tr>
      </tbody>
    </table>
  </div>
  <a th:href="@{/}" class="back-link">&#8592; Volver al inicio</a>
</div>
<footer>Mundial 2026 &mdash; Sistema de Gestión</footer>
</body>
</html>
