<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Jugador</title>
</head>
<body>
    <h1>Formulario Jugador</h1>
    <form th:action="@{/jugadores/guardar}" th:object="${jugador}" method="post">
        <input type="hidden" th:field="*{id}"/>
        <label>Nombre: <input type="text" th:field="*{nombre}"/></label><br>
        <label>Apellido: <input type="text" th:field="*{apellido}"/></label><br>
        <label>Numero: <input type="number" th:field="*{numero}"/></label><br>
        <label>Posicion: <input type="text" th:field="*{posicion}"/></label><br>
        <button type="submit">Guardar</button>
    </form>
    <a th:href="@{/jugadores}">Volver</a>
</body>
</html>
